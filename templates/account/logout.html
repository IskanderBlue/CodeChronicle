{% extends "base.html" %}
{% load i18n %}
{% load account %}

{% block title %}{% trans "Sign Out" %} - CodeChronicle{% endblock %}

{% block content %}
<div class="min-h-full flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <h2 class="mt-6 font-serif text-3xl font-bold text-ink">Sign Out</h2>
        <p class="mt-2 text-sm text-ink-2">
            Are you sure you want to sign out?
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div
            class="bg-surface-2 py-8 px-4 sm:px-10 border border-rule">
            <form method="POST" action="{% url 'account_logout' %}">
                {% csrf_token %}
                {% if redirect_field_value %}
                <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
                {% endif %}

                <div class="space-y-4">
                    <button type="submit"
                        class="ui-btn w-full py-2 px-4 text-sm uppercase tracking-[0.06em]">
                        {% trans 'Sign Out' %}
                    </button>

                    <a href="/"
                        class="w-full flex justify-center py-2 px-4 border border-ink-2 text-sm font-semibold uppercase tracking-[0.06em] text-ink-2 bg-surface hover:bg-surface-2 focus:outline-none focus:ring-1 focus:ring-secondary">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
