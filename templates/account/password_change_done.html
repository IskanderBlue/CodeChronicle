{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Password Changed" %} - CodeChronicle{% endblock %}

{% block content %}
<div class="min-h-full flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <div
            class="mx-auto flex items-center justify-center h-12 w-12 border border-insert">
            <svg class="h-6 w-6 text-insert" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        <h2 class="mt-6 font-serif text-3xl font-bold text-ink">Password Changed Successfully</h2>
        <p class="mt-2 text-sm text-ink-2">
            Your account is now updated with your new password.
        </p>
        <div class="mt-6">
            <a href="/"
                class="ui-btn w-full py-2 px-4 text-sm uppercase tracking-[0.06em]">
                Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
