# Pre-commit hooks for CodeChronicle.
#
# Install once per clone (with the venv active):
#     pre-commit install
# Run manually against everything:
#     pre-commit run --all-files
#
# NOTE on the mypy hook: the django-stubs plugin imports Django settings to
# introspect models, so settings.development must be importable — which needs
# DATABASE_URL.  Locally that comes from .env (loaded in settings/base.py).
# In CI, set a dummy value, e.g. DATABASE_URL=postgres://u:p@localhost/db.

repos:
  # ---- Generic hygiene -------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  # ---- Lint (ruff, isolated env — no project imports needed) -----------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: [--fix]

  # ---- Types (mypy + django-stubs plugin, project venv) ----------------
  # Runs from the active environment (language: system) so it sees the
  # django-stubs plugin, the project's deps, and DATABASE_URL — none of
  # which exist in pre-commit's isolated per-hook virtualenvs.
  # REQUIRES the project venv to be active when committing (as do all
  # project commands — see CLAUDE.md); `python -m mypy` then resolves to
  # the venv's mypy. pass_filenames: false because the plugin needs the
  # whole app's model graph, not just the staged files.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (django-stubs plugin)
        entry: python -m mypy
        language: system
        types: [python]
        pass_filenames: false
        args: ["api", "core", "config", "code_chronicle"]
